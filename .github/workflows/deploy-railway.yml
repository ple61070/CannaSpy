name: Deploy API to Railway

on:
  push:
    branches: [main]
    paths:
      - 'packages/api/**'
      - 'railway.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway up \
            --service 1c5fb47d-dc03-406f-bba3-3cda54bcc41b \
            --environment b4c5ff2d-5b7d-45ad-8849-c4aafbdec246 \
            --detach
