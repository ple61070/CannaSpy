# nixpacks.toml — Railway build config for CannaSpy API
#
# Goal: keep the API booting even though scrape.worker.ts spawns python3.
# We install just the Python 3.11 binary so the spawn doesn't ENOENT.
# Scraper dependencies (Playwright, etc.) are NOT installed in this image
# — the primary collector pipeline isn't built yet, and a missing dep now
# fails the worker gracefully (not the whole API) thanks to the spawn
# 'error' handler in scrape.worker.ts.
#
# When the primary collector lands, switch to a Dockerfile that does
# `python3 -m ensurepip` then `pip install -r requirements.txt` — pip
# isn't reliably on the module path in the Nixpacks Python environment.

[phases.setup]
nixPkgs = ["nodejs_20", "pnpm-9_x", "python311"]

[phases.install]
cmds = ["NODE_ENV=development pnpm install --frozen-lockfile"]

[phases.build]
cmds = [
  "rm -rf packages/api/dist",
  "pnpm --filter api build"
]

[start]
cmd = "node --dns-result-order=ipv4first packages/api/dist/index.js"
