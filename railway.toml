[build]
builder = "NIXPACKS"
# Build steps live in nixpacks.toml so we can install Python alongside Node.
# Do NOT add buildCommand here — it would override nixpacks.toml phases.

[deploy]
# startCommand also defined in nixpacks.toml [start]; kept here as the source of truth for Railway.
startCommand = "node --dns-result-order=ipv4first packages/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
